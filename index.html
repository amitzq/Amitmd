<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title><style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* floating hearts */

.heart{
position:fixed;
color:red;
font-size:18px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* start screen */

#start{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-size:30px;
cursor:pointer;
}

/* slides */

.slide{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

/* image */

img{
width:80%;
max-width:320px;
border-radius:20px;
box-shadow:0 0 25px pink;
margin-bottom:20px;
}

/* text */

h1{
font-size:32px;
margin:10px;
}

p{
font-size:22px;
line-height:1.6;
}

/* button */

button{
margin-top:25px;
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
cursor:pointer;
}

/* neon glow */

.glow{
font-size:40px;
color:white;
text-shadow:
0 0 5px #ff2d75,
0 0 10px #ff2d75,
0 0 20px #ff2d75,
0 0 40px #ff2d75;
}

</style></head><body><div id="start" onclick="start()">Tap For Your Surprise ❤️</div><audio id="song" src="If The World Was Ending.mp3"></audio>

<!-- Slide 1 (Photo) --><div class="slide" id="s1"><img src="Snapshot-1740021833.jpg"><button onclick="next()">Tap Next ➜</button>

</div><!-- Slide 2 --><div class="slide" id="s2"><h1>Happy Birthday Cutiee ❤️‍🩹🧿🫶</h1><button onclick="next()">Tap Next ➜</button>

</div><!-- Slide 3 --><div class="slide" id="s3"><p>
Happy Birthday to someone  
who once meant a lot to me.  Maybe we don’t talk like before,
but the memories are still special.

I wish your life becomes
full of happiness and success.

Stay blessed and always smile ❤️

</p><button onclick="next()">Tap Next ➜</button>

</div><!-- Last Slide --><div class="slide" id="s4"><h1 class="glow">Again Happy Birthday ❤️‍🩹🫶</h1></div><script>

let current=1

function start(){

document.getElementById("start").style.display="none"

document.getElementById("song").play()

document.getElementById("s1").style.display="flex"

}

function next(){

document.getElementById("s"+current).style.display="none"

current++

document.getElementById("s"+current).style.display="flex"

}

/* hearts animation */

setInterval(()=>{

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"

h.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),6000)

},300)

</script></body>
</html>
