<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title><style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

/* slide style */

.slide{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.active{
display:flex;
}

/* image */

img{
width:300px;
border-radius:15px;
box-shadow:0 0 20px pink;
margin-bottom:20px;
}

/* text */

h1{
font-size:32px;
}

p{
font-size:22px;
line-height:1.6;
}

/* button */

button{
margin-top:30px;
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
cursor:pointer;
}

.glow{
font-size:38px;
text-shadow:
0 0 5px #ff2d75,
0 0 10px #ff2d75,
0 0 20px #ff2d75,
0 0 40px #ff2d75;
}

</style></head><body><audio id="song" src="If The World Was Ending.mp3"></audio>

<!-- slide 1 --><div class="slide active" id="slide1"><img src="photo.jpg"><button onclick="nextSlide()">Tap Next ➜</button>

</div><!-- slide 2 --><div class="slide" id="slide2"><h1>Happy Birthday Cutiee ❤️‍🩹🧿🫶</h1><button onclick="nextSlide()">Tap Next ➜</button>

</div><!-- slide 3 --><div class="slide" id="slide3"><p>
Happy Birthday to someone who once meant a lot to me.  
Maybe we don’t talk like before,  
but the memories are still special.  
I wish your life becomes full of happiness,  
success and beautiful moments.  
Stay blessed and keep smiling always ❤️
</p><button onclick="nextSlide()">Tap Next ➜</button>

</div><!-- slide 4 --><div class="slide" id="slide4"><h1 class="glow">Again Happy Birthday ❤️‍🩹🫶</h1></div><script>

let current=1

document.getElementById("song").play()

function nextSlide(){

document.getElementById("slide"+current).classList.remove("active")

current++

document.getElementById("slide"+current).classList.add("active")

}

</script></body>
</html>
